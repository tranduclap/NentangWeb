<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản E-Commerce</title>
</head>
<body>

    <h1>Đăng ký tài khoản mới</h1>

    <form action="#" method="POST">
        
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <p>
                <label for="full-name">Họ tên:</label><br>
                <input type="text" id="full-name" name="full-name" 
                       required minlength="2" maxlength="50" placeholder="Nhập họ và tên (2-50 ký tự)">
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" 
                       required placeholder="example@gmail.com">
            </p>

            <p>
                <label for="phone">Số điện thoại:</label><br>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
            </p>

            <p>
                <label for="dob">Ngày sinh:</label><br>
                <!-- max="2026-05-10" để không cho phép chọn ngày tương lai -->
                <input type="date" id="dob" name="dob" max="2026-05-10">
            </p>

            <p>
                <label>Giới tính:</label><br>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Nam</label>
                
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </p>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>

            <p>
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" 
                       pattern="[A-Za-z0-9_]{3,20}" 
                       placeholder="3-20 ký tự (chữ, số, gạch dưới)">
            </p>

            <p>
                <label for="password">Mật khẩu:</label><br>
                <input type="password" id="password" name="password" 
                       minlength="8" 
                       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" 
                       placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số">
            </p>

            <p>
                <label for="confirm-password">Xác nhận mật khẩu:</label><br>
                <input type="password" id="confirm-password" name="confirm-password" 
                       minlength="8" 
                       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" 
                       placeholder="Nhập lại mật khẩu">
            </p>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <p>
                <label for="city">Thành phố:</label><br>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </p>

            <p>
                <label for="district">Quận/Huyện:</label><br>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="caugiay">Cầu Giấy</option>
                </select>
            </p>

            <p>
                <label for="address">Địa chỉ chi tiết:</label><br>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản dịch vụ</label>
        </p>

        <p>
            <button type="submit">Đăng ký</button>
            <button type="reset">Làm lại</button>
        </p>

    </form>
</body>
</html>
