<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu Sản phẩm Multimedia</title>
</head>
<body>

    <header>
        <svg width="100" height="50" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="5" width="40" height="40" fill="blue" />
            <circle cx="75" cy="25" r="20" fill="red" />
        </svg>
        <h1>Trang Sản Phẩm Công Nghệ</h1>
    </header>

    <hr>

    <section>
        <h2>Bộ sưu tập sản phẩm</h2>

        <figure>
            <img src="https://via.placeholder.com/400x300?text=iPhone+16" 
                 alt="Điện thoại iPhone 16 màu Titan Sa Mạc" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>iPhone 16 Pro Max - Phiên bản mới nhất năm 2026</figcaption>
        </figure>

        <figure>
            <img src="https://via.placeholder.com/400x300?text=MacBook+M4" 
                 alt="Laptop MacBook Pro chip M4 siêu mạnh" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>MacBook Pro M4 - Hiệu năng vượt trội cho lập trình viên</figcaption>
        </figure>

        <figure>
            <img src="https://via.placeholder.com/400x300?text=Apple+Watch+10" 
                 alt="Đồng hồ thông minh Apple Watch Series 10" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Apple Watch Series 10 - Theo dõi sức khỏe chuyên sâu</figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Video Trên Tay Sản Phẩm (YouTube)</h2>
        <iframe width="560" height="315" 
                src="https://www.youtube.com/embed/70gCxCTpvBg?si=L4aqENnO29DEpAuN" 
                title="Đánh giá sản phẩm" 
                frameborder="0" 
                allowfullscreen>
        </iframe>
    </section>

    <hr>

    <section>
        <h2>Video Giới Thiệu Giao Diện</h2>
        <video width="640" controls poster="https://via.placeholder.com/640x360?text=Anh+Cho+Video">
            <source src="intro-video.mp4" type="video/mp4">
            <source src="intro-video.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ xem video này.
        </video>
    </section>

    <hr>

    <section>
        <h2>Nhạc Nền Không Gian Cửa Hàng</h2>
        <audio controls>
            <source src="store-ambience.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ nghe nhạc.
        </audio>
    </section>

    <footer>
        <p>&copy; 2026 - Bản quyền thuộc về Trần Đức Lập</p>
    </footer>

</body>
</html>
